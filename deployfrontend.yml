kind: Deployment
apiVersion: apps/v1
metadata:
  name: wezvafrontendapp
  namespace: wezvatechfb
  labels:
    app.kubernetes.io/name: wezvafrontendapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wezvafrontendapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wezvafrontendapp
    spec:
     imagePullSecrets:
       - name: awsecr-cred
     containers:
       - name: wezvafrontendapp
         image: 303255670930.dkr.ecr.ap-south-1.amazonaws.com/wezvatechbackend:fb11
         imagePullPolicy: IfNotPresent
         ports:
           - containerPort: 3000
         resources:
            limits: 
              cpu: 400m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: wezvafrontendapp
  name: backend-svc
  namespace: wezvatechfb
spec:
  ports:
  - port: 3000
    protocol: TCP
    targetPort: 3000
    nodePort: 31000	
  selector:
    app.kubernetes.io/name: wezvafrontendapp
  type: NodePort
